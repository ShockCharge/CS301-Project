<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Sans Code (Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Google Icons (Icons) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

    <!-- Page Title -->
    <title>Study Planner | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- CSS -->
    <link rel="icon" href="../images/studyplanner_icon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="header flex-column py-4 px-3">    
        <img class="mb-3" src="../images/studyplanner_icon.png">
        <h1 class="m-0">Study Planner</h1>
    </div>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-8 col-xl-6 col-xxl-5">
                
                <div class="text-center mb-4">
                    <h3>Welcome back!</h3>
                    <p>Organize your class, assignment, and exam.</p>
                </div>

                <form class="d-flex flex-column gap-3 mb-4">
                    <input type="email" placeholder="Email" class="form-control custom-input" required>
                    <p id="light_gray_text" class="text-end mb-0"><u>Forgot password?</u></p>
                    <input type="password" placeholder="Password" class="form-control custom-input" required>
                    <button class="btn w-100" id="gray-button">Log in</button>
                </form>

                <p id="light_gray_text" class="text-center mb-0">Don't have an account? <u id="normal_gray_text"><a href="../html/signup.html">Sign up</a></u></p>
            </div>
        </div>
    </main>
</body>
</html>
