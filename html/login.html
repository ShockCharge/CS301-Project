<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner | Login</title>
    <link rel="icon" href="../images/studyplanner_icon.png">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="header">    
        <img src="../images/studyplanner_icon.png">
        <h1>Study Planner</h1>
    </div>

    <div class="container">
        <div class="item1">
            <h3>Welcome back!</h3>
            <p>Organize your class, assignment, and exam.</p>
        </div>

        <div class="item2">
            <label>Email Address</label>
            <input type="email" required>

            <label>Password</label>
            <input type="password" required>
            <p><u>Forgot password?</u></p>
        
        <div class="item3">
            <button>Continue</button>

            <p>Don't have an account? <u>Sign up</u></p>
        </div>

        <div class="item4">
            <p><u>Terms of Service</u> | <u>Privacy Policy</u></p>
        </div>
    </div>
</body>
</html>
