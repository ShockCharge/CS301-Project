<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Sans Code (Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Google Icons (Icons) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

    <!-- Website Title -->
    <title>Study Planner | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- CSS -->
    <link rel="icon" href="../images/studyplanner_icon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="header">    
        <img src="../images/studyplanner_icon.png">
        <h1>Study Planner</h1>
    </div>

    <div class="container">
        <div class="item1">
            <h3>Welcome back!</h3>
            <p>Organize your class, assignment, and exam.</p>
        </div>

        <div class="item2">
            <input type="email" placeholder="Email" required>
            <p id="light_gray_text"><u>Forgot password?</u></p>
            <input type="password" placeholder="Password" required>
        </div>

        <div class="item3">
            <button>Log in</button>

            <p id="light_gray_text">Don't have an account? <u id="normal_gray_text">Sign up</u></p>
        </div>
    </div>
</body>
</html>
