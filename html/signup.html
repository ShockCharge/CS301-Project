<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Sans Code (Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Google Icons (Icons) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

    <!-- Page Title -->
    <title>Study Planner | Signup</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- CSS -->
    <link rel="icon" href="../images/studyplanner_icon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="header flex-column py-4 px-3 text-center">
        <img src="../images/studyplanner_icon.png" class="mb-3" style="width: 80px;">
        <h1 class="m-0">Study Planner</h1>
    </div>

    <main class="container my-5 d-flex justify-content-center align-items-center">
        <div class="signup-form w-100" style="max-width: 400px;">
            
            <div class="text-center mb-4">
                <h3>Create your account</h3>
                <p>Organize your class, assignment, and exam.</p>
            </div>

            <form class="d-flex flex-column gap-3">
                <input type="text" name="name" placeholder="Name" class="form-control custom-input" required>
                <input type="email" name="email" placeholder="Email" class="form-control custom-input" required>
                <input type="text" name="institute" placeholder="Institute Name" class="form-control custom-input" required>
                <input type="password" name="password" placeholder="Password" class="form-control custom-input" required>
                <input type="password" name="confirm_password" placeholder="Confirm Password" class="form-control custom-input" required>
                <button type="submit" class="btn w-100" id="gray-button">Sign up</button>
            </form>

            <p id="light_gray_text" class="text-center mt-3">
                Already have an account? <a href="login.html" id="normal_gray_text">Sign in</a>
            </p>
        </div>
    </main>
</body>
</html>
