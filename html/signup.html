<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Sans Code (Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Google Icons (Icons) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>

    <!-- Website Title -->
    <title>Study Planner | Signup</title>

    <link rel="icon" href="../images/studyplanner_icon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/signup.css">
</head>
<body>
    <div class="header">
        <img src="../images/studyplanner_icon.png">
        <h1>Study Planner</h1>
    </div>

    <div class="container">
        <div class="item1">
            <h3>Create your account</h3>
            <p>Organize your class, assignment, and exam.</p>
        </div>

        <div class="item2">
            <input type="email" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <input type="text" placeholder="Institute Name" required>
            <input type="password" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>
        </div>

        <div class="item3">
            <button>Sign up</button>
            <p id="light_gray_text">Already have an account? <u id="normal_gray_text">Sign in</u></p>
        </div>
    </div>
</body>
</html>
