<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner | Signup</title>
    <link rel="icon" href="../images/studyplanner_icon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/signup.css">
</head>
<body>
    <div class="container">

        <img src="../images/studyplanner_icon.png">
        <h1 id="title">Study Planner</h1>
        <p id="subtitle">Organize your class, assignment, and exam.</p><br>

        <h3>Create your account</h3><br>

            <label>Email Address</label>
            <input type="email" required>

            <label>Institute</label>
            <input type="text" required>

            <label>Password</label>
            <input type="password" required>

            <label>Confirm Password</label>
            <input type="password" required><br>

            <button>Continue</button><br>

            <p>Already have an account? Sign in</p><br>

            <p>Terms of Service | Privacy Policy</p>
    </div>
</body>
</html>
