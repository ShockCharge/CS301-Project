<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner | Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="../V2_Static/css/style.css">
    <link rel="stylesheet" href="../V2_Static/css/dashboard.css">

    <!-- JavaScript -->
</head>
<body>
    <div class="container">
        <nav class="header">
            <!-- ########## Header ########## -->
            <span class="header-title">Study Planner</span>     
                <!-- Title -->
                <div class="header-content">
                    <!-- Time -->
                    <div class="header-time">[TEMPORARY]</div> 
                    <!-- Date -->
                    <div class="header-date">[TEMPORARY]</div> 
                </div>

            <!-- ########## Menu ########## -->
            <button class="menu">
                <span>Dashboard</span>
                <span>Schedule</span>
                <span>Activities</span>
                <span>Chatbot</span>
                <span>Settings</span>
            </button>
        </nav>

        <!-- ########## Content ########## -->
        <main class="content">
        <h1 class="content-title">Dashboard</h1>
        <div class="card-title">
            <h2 class="card-title">Today's Tasks</h2>
            <button class="content-button">
                <span>+ New Task</span>
            </button>
        </div>

        <!-- ########## Quick Action ########## -->
        <div class="quick-action">
            <span class="quick-action-text">Quick Action</span>
            <button class="quick-action-button">Add Task</button>
            <span class="quick-action-schedule">View Schedule</span>
        </div>

        <!-- ########## Progress Overview ########## -->
        <div class="progress-overview">
            <h2 class="progress-overview-title">Progress Overview</h2>
            <p class="progress-overview-text">This [TEMPORARY] study time: [TEMPORARY]</p>
        </div>

        <!-- ########## Upcoming Exams ########## -->
        <div class="upcoming-exam">
            <span class="card-title">
            Upcoming Exams
            </span>
        </div>

        </main>
    </div>
</body>
</html>
