<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner | Verify Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/verify2fa_mobile.css') }}">
</head>
<body>
    <div class="verify-shell">

        <!-- Brand -->
        <div class="verify-brand">
            <div class="verify-lock-icon">🔒</div>
            <h1>Study Planner</h1>
            <p>Two-step verification</p>
        </div>

        <!-- Card -->
        <div class="verify-card">
            <p class="verify-card-title">Enter your verification code</p>
            <p class="verify-card-sub">We emailed a 6-digit code to:</p>
            <span class="verify-email-badge">
                ✉️ {{ email }}
            </span>

            {% if error %}
            <div class="alert-error">
                ⚠️ {{ error }}
            </div>
            {% endif %}

            {% if info %}
            <div class="alert-info">
                ✓ {{ info }}
            </div>
            {% endif %}

            <!-- OTP Form -->
            <form id="otp-form" action="/verify-2fa" method="POST">
                <label class="otp-label">6-digit code</label>
                <div class="otp-row">
                    <input class="otp-box" maxlength="1" inputmode="numeric" autocomplete="off">
                    <input class="otp-box" maxlength="1" inputmode="numeric" autocomplete="off">
                    <input class="otp-box" maxlength="1" inputmode="numeric" autocomplete="off">
                    <input class="otp-box" maxlength="1" inputmode="numeric" autocomplete="off">
                    <input class="otp-box" maxlength="1" inputmode="numeric" autocomplete="off">
                    <input class="otp-box" maxlength="1" inputmode="numeric" autocomplete="off">
                </div>

                <input type="hidden" name="otp" id="otp-hidden">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <!-- Timer bar -->
                <div class="timer-bar-wrap">
                    <div class="timer-bar-fill" id="timer-bar"></div>
                </div>

                <button type="submit" class="verify-btn" id="verify-btn" disabled>
                    ✓ &nbsp;Verify Code
                </button>
            </form>

            <!-- Footer -->
            <div class="verify-footer">
                <span class="timer-text">
                    Expires in <span id="countdown">10:00</span>
                </span>
                <span>
                    Didn't get it?
                    <form action="/resend-2fa" method="POST" class="resend-form">
                        <button type="submit" class="resend-btn">Resend code</button>
                    </form>
                </span>
            </div>
        </div>

        <a href="/" class="back-link">← Back to Login</a>
    </div>

<script src="{{ url_for('static', filename='js/verify2fa_mobile.js') }}"></script>
</body>
</html>
