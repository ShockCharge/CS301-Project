<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner – Verify Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#d3d3d3; display:flex; justify-content:center;
           align-items:center; height:100vh; margin:0; }
    .phone-frame { width:390px; height:844px; border:10px solid #222;
      border-radius:40px; overflow:hidden; background:#0d1b8c;
      box-shadow:0 10px 30px rgba(0,0,0,.3);
      display:flex; flex-direction:column; justify-content:center; }
    .screen { padding:30px 28px; color:white; text-align:center; }
    .logo { width:90px; height:90px; border-radius:50%;
      background:linear-gradient(135deg,#5f6cff,#2ee6c9);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 20px; font-size:36px; }
    h1 { font-size:22px; font-weight:600; margin-bottom:6px; }
    .subtitle { font-size:13px; opacity:.75; margin-bottom:4px; }
    .email-badge { display:inline-block; background:rgba(255,255,255,.15);
      border-radius:20px; padding:4px 14px; font-size:12px; margin-bottom:24px; }
    .otp-row { display:flex; justify-content:center; gap:10px; margin-bottom:20px; }
    .otp-box { width:46px; height:56px; border-radius:12px;
      border:2px solid rgba(255,255,255,.35);
      background:rgba(255,255,255,.15); color:#fff;
      font-size:24px; font-weight:700; text-align:center;
      outline:none; caret-color:#2ee6c9; }
    .otp-box:focus { border-color:#2ee6c9; }
    .btn-verify { width:100%; border-radius:25px; padding:11px;
      background:#cfd8dc; border:none; color:#333;
      font-weight:600; font-size:15px; margin-bottom:14px; }
    .alert-error { background:rgba(255,80,80,.25);
      border:1px solid rgba(255,100,100,.5); color:#ffd0d0;
      border-radius:12px; padding:10px 14px; font-size:13px; margin-bottom:16px; }
    .alert-info { background:rgba(46,230,201,.2);
      border:1px solid rgba(46,230,201,.4); color:#c0fff5;
      border-radius:12px; padding:10px 14px; font-size:13px; margin-bottom:16px; }
    .small-text { font-size:13px; opacity:.8; margin-top:6px; }
    a { color:#cfd8dc; font-size:13px; text-decoration:underline; cursor:pointer; }
    .timer { font-size:12px; opacity:.6; margin-top:8px; }
  </style>
</head>
<body>
<div class="phone-frame">
  <div class="screen">
    <div class="logo">🔐</div>
    <h1>Two-Step Verification</h1>
    <p class="subtitle">We emailed a 6-digit code to</p>
    <span class="email-badge">{{ email }}</span>

    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}
    {% if info %}
    <div class="alert-info">{{ info }}</div>
    {% endif %}

    <form id="otp-form" action="/verify-2fa" method="POST">
      <div class="otp-row">
        <input class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
        <input class="otp-box" maxlength="1" inputmode="numeric">
        <input class="otp-box" maxlength="1" inputmode="numeric">
        <input class="otp-box" maxlength="1" inputmode="numeric">
        <input class="otp-box" maxlength="1" inputmode="numeric">
        <input class="otp-box" maxlength="1" inputmode="numeric">
      </div>
      <input type="hidden" name="otp" id="otp-hidden">
      <button type="submit" class="btn btn-verify" id="verify-btn" disabled>Verify</button>
    </form>

    <div class="small-text">
      Didn't get a code?
      <form action="/resend-2fa" method="POST" style="display:inline">
        <button type="submit"
          style="background:none;border:none;padding:0;color:#cfd8dc;
                 font-size:13px;text-decoration:underline;cursor:pointer">
          Resend
        </button>
      </form>
    </div>
    <div class="timer">Code expires in <span id="cd">10:00</span></div>
    <div class="mt-3"><a href="/">← Back to Login</a></div>
  </div>
</div>

<script>
  const boxes=document.querySelectorAll('.otp-box');
  const hidden=document.getElementById('otp-hidden');
  const btn=document.getElementById('verify-btn');
  const form=document.getElementById('otp-form');

  function sync(){
    const v=[...boxes].map(b=>b.value).join('');
    hidden.value=v; btn.disabled=v.length<6;
  }
  boxes.forEach((b,i)=>{
    b.addEventListener('input',()=>{
      b.value=b.value.replace(/D/g,'');
      if(b.value&&i<5) boxes[i+1].focus();
      sync();
    });
    b.addEventListener('keydown',e=>{
      if(e.key==='Backspace'&&!b.value&&i>0){
        boxes[i-1].focus(); boxes[i-1].value=''; sync();
      }
    });
    b.addEventListener('paste',e=>{
      e.preventDefault();
      const p=(e.clipboardData||window.clipboardData)
               .getData('text').replace(/D/g,'').slice(0,6);
      [...p].forEach((c,j)=>{ if(boxes[j]) boxes[j].value=c; });
      boxes[Math.min(p.length,5)].focus(); sync();
    });
  });
  boxes[5].addEventListener('input',()=>{
    if(hidden.value.length===6) setTimeout(()=>form.submit(),120);
  });

  let secs=600;
  const cd=document.getElementById('cd');
  const t=setInterval(()=>{
    secs--;
    if(secs<=0){ clearInterval(t); cd.textContent='0:00';
      btn.disabled=true; return; }
    cd.textContent=Math.floor(secs/60)+':'+(secs%60).toString().padStart(2,'0');
  },1000);
  boxes[0].focus();
</script>
</body>
</html>
