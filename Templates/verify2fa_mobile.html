<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner – Verify Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #d3d3d3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Same phone frame as login_mobile.html */
    .phone-frame {
      width: 390px;
      height: 844px;
      border: 10px solid #222;
      border-radius: 40px;
      overflow: hidden;
      background: #0d1b8c;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .screen {
      padding: 30px 28px;
      color: white;
      text-align: center;
    }

    .logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5f6cff, #2ee6c9);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 36px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.75;
      margin-bottom: 4px;
    }

    /* Shows the user which email the code was sent to */
    .email-badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      margin-bottom: 24px;
    }

    /* ── OTP digit boxes ── */
    .otp-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .otp-box {
      width: 46px;
      height: 56px;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
      caret-color: #2ee6c9;
    }

    .otp-box:focus {
      border-color: #2ee6c9;
    }

    /* Verify button */
    .btn-verify {
      width: 100%;
      border-radius: 25px;
      padding: 11px;
      background: #cfd8dc;
      border: none;
      color: #333;
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 14px;
      cursor: pointer;
    }

    .btn-verify:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Alert boxes */
    .alert-error {
      background: rgba(255,80,80,0.25);
      border: 1px solid rgba(255,100,100,0.5);
      color: #ffd0d0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .alert-info {
      background: rgba(46,230,201,0.2);
      border: 1px solid rgba(46,230,201,0.4);
      color: #c0fff5;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .small-text {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 6px;
    }

    /* Resend button styled as a link */
    .resend-btn {
      background: none;
      border: none;
      padding: 0;
      color: #cfd8dc;
      font-size: 13px;
      text-decoration: underline;
      cursor: pointer;
    }

    a {
      color: #cfd8dc;
      font-size: 13px;
      text-decoration: underline;
    }

    .timer {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="phone-frame">
  <div class="screen">

    <div class="logo">&#128274;</div>

    <h1>Two-Step Verification</h1>
    <p class="subtitle">We emailed a 6-digit code to</p>
    <span class="email-badge">{{ email }}</span>

    <!-- Error message (wrong/expired code) -->
    {% if error %}
    <div class="alert-error">{{ error }}</div>
    {% endif %}

    <!-- Info message (code resent) -->
    {% if info %}
    <div class="alert-info">{{ info }}</div>
    {% endif %}

    <!-- OTP form -->
    <form id="otp-form" action="/verify-2fa" method="POST">

      <!-- 6 individual digit boxes (visual only) -->
      <div class="otp-row">
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code">
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
      </div>

      <!-- Hidden input that collects all 6 digits as one string for Flask -->
      <input type="hidden" name="otp" id="otp-hidden">

      <button type="submit" class="btn-verify" id="verify-btn" disabled>Verify</button>
    </form>

    <!-- Resend link -->
    <div class="small-text">
      Didn't receive a code?
      <form action="/resend-2fa" method="POST" style="display:inline;">
        <button type="submit" class="resend-btn">Resend</button>
      </form>
    </div>

    <!-- Live countdown timer -->
    <div class="timer">
      Code expires in <span id="countdown">10:00</span>
    </div>

    <div class="mt-3">
      <a href="/">&#8592; Back to Login</a>
    </div>

  </div>
</div>

<script>
  // ── Grab DOM elements ──
  const boxes     = document.querySelectorAll('.otp-box');
  const hidden    = document.getElementById('otp-hidden');
  const verifyBtn = document.getElementById('verify-btn');
  const form      = document.getElementById('otp-form');

  // ── Keep the hidden input in sync with the 6 boxes ──
  function syncHidden() {
    const val = [...boxes].map(b => b.value).join('');
    hidden.value     = val;
    verifyBtn.disabled = val.length < 6;
  }

  boxes.forEach((box, i) => {
    // Only allow digits; auto-advance to next box on input
    box.addEventListener('input', () => {
      box.value = box.value.replace(/\D/g, '');           // strip non-digits
      if (box.value && i < boxes.length - 1) {
        boxes[i + 1].focus();                              // move forward
      }
      syncHidden();
    });

    // Backspace on an empty box moves focus back
    box.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !box.value && i > 0) {
        boxes[i - 1].focus();
        boxes[i - 1].value = '';
        syncHidden();
      }
    });

    // Paste a full 6-digit code anywhere — fills all boxes at once
    box.addEventListener('paste', e => {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData)
                       .getData('text')
                       .replace(/\D/g, '')
                       .slice(0, 6);
      [...pasted].forEach((ch, idx) => {
        if (boxes[idx]) boxes[idx].value = ch;
      });
      boxes[Math.min(pasted.length, 5)].focus();
      syncHidden();
    });
  });

  // Auto-submit when the 6th digit is typed
  boxes[5].addEventListener('input', () => {
    if (hidden.value.length === 6) {
      setTimeout(() => form.submit(), 120);   // tiny delay feels natural
    }
  });

  // ── Countdown timer (10 minutes = 600 seconds) ──
  let seconds        = 600;
  const countdownEl  = document.getElementById('countdown');

  const tick = setInterval(() => {
    seconds--;

    if (seconds <= 0) {
      clearInterval(tick);
      countdownEl.textContent = '0:00';
      verifyBtn.disabled = true;
      return;
    }

    const m = Math.floor(seconds / 60);
    const s = (seconds % 60).toString().padStart(2, '0');
    countdownEl.textContent = `${m}:${s}`;
  }, 1000);

  // Focus the first box on page load
  boxes[0].focus();
</script>

</body>
</html>
