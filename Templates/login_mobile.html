<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner Login</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #d3d3d3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Samsung S24 Ultra Frame */
    .phone-frame {
      width: 390px;
      height: 844px;
      border: 10px solid #222;
      border-radius: 40px;
      overflow: hidden;
      background: #0d1b8c;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .screen {
      padding: 30px 20px;
      color: white;
      text-align: center;
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5f6cff, #2ee6c9);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 40px auto 20px;
      font-size: 40px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
    }

    h2 {
      margin-top: 20px;
      font-size: 28px;
      font-weight: 500;
    }

    p {
      font-size: 14px;
      opacity: 0.8;
    }

    .form-control {
      border-radius: 30px;
      text-align: center;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      margin: 10px 0;
      padding: 12px;
    }

    .form-control::placeholder {
      color: rgba(255,255,255,0.7);
    }

    .btn-login {
      margin-top: 15px;
      border-radius: 25px;
      padding: 10px 30px;
      background: #cfd8dc;
      border: none;
      color: #333;
    }

    a {
      color: #cfd8dc;
      font-size: 13px;
      text-decoration: underline;
    }

    .small-text {
      margin-top: 10px;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="phone-frame">
  <div class="screen">

    <div class="logo">
      🎓
    </div>

    <h1>Study Planner</h1>

    <h2>Welcome Back!</h2>
    <p>Organize your class, assignment,and exam</p>
    
    <form method="POST" action="/">
      <input type="text"     name="email"    class="form-control" placeholder="Username">
      <input type="password"  name="password"  class="form-control" placeholder="Password">
      <button type="submit" class="btn btn-login">Log In</button>
    </form>

    <div class="mt-3">
      <a href="#">Forgot Password?</a>
    </div>

    <div class="small-text">
      Don’t have an account? <a href="#">Sign up</a>
    </div>

  </div>
</div>

</body>
</html>
