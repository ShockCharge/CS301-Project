<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Study Planner Login</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"/>

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet"/>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Nunito", sans-serif;
      background: linear-gradient(135deg, #08145f, #0d1b8c);
      display: flex;
      justify-content: center;
      align-items: center;

      padding: 20px;
      overflow-x: hidden;
    }

    .mobile-frame {
      width: 100%;
      max-width: 390px;
      min-height: 844px;
      background: linear-gradient(180deg, #0d1b8c, #1629b8);
      border-radius: 30px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
    }

    .screen {
      width: 100%;
      padding: 40px 25px;
      color: white;
      text-align: center;
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5f6cff, #2ee6c9);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 20px auto 25px;
      font-size: 42px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 25px;
      font-size: 32px;
      font-weight: 700;
    }

    p {
      font-size: 15px;
      opacity: 0.85;
      margin-bottom: 30px;
    }

    .form-control {
      border-radius: 30px;
      text-align: center;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      margin-bottom: 18px;
      padding: 14px 18px;
      font-size: 15px;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: none;
    }

    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .btn-login {
      margin-top: 10px;
      border-radius: 30px;
      padding: 12px;
      width: 100%;
      background: #ffffff;
      border: none;
      color: #0d1b8c;
      font-weight: 700;
      transition: 0.3s ease;
    }

    .btn-login:hover {
      background: #dfe6ff;
      transform: translateY(-2px);
    }

    a {
      color: #dfe6ff;
      font-size: 14px;
      text-decoration: underline;
    }

    .small-text {
      margin-top: 18px;
      font-size: 14px;
    }

    /* Tablet screens */
    @media (max-width: 992px) {
      .mobile-frame {
        max-width: 500px;
        min-height: auto;
      }
    }

    /* Mobile screens */
    @media (max-width: 576px) {
      body {
        padding: 0;
      }

      .mobile-frame {
        max-width: 100%;
        min-height: 100vh;
        border-radius: 0;
      }

      .screen {
        padding: 35px 20px;
      }

      h1 {
        font-size: 24px;
      }

      h2 {
        font-size: 28px;
      }

      .logo {
        width: 90px;
        height: 90px;
        font-size: 38px;
      }
    }

    /* Big screens like Nest Hub */
    @media (min-width: 1400px) {
      .mobile-frame {
        transform: scale(1.05);
      }
    }

    /* Landscape phones/tablets */
    @media (max-height: 700px) and (orientation: landscape) {
      body {
        padding: 10px;
      }

      .mobile-frame {
        min-height: auto;
        max-width: 900px;
      }

      .screen {
        padding: 25px;
      }

      .logo {
        margin-top: 10px;
        margin-bottom: 15px;
      }

      h2 {
        margin-top: 15px;
      }

      p {
        margin-bottom: 20px;
      }
 
  <!-- Better responsive support -->
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Study Planner Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"/>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet"/>

  <style>

    *{
      box-sizing:border-box;
    }

    body{

      margin:0;

      min-height:100vh;

      display:flex;

      justify-content:center;

      align-items:center;

      font-family:'Nunito', sans-serif;

      /* Removed white background */
      background:transparent;

      overflow-x:hidden;

      padding:20px;
    }

    /* Main responsive wrapper */

    .app-wrapper{

      width:100%;

      display:flex;

      justify-content:center;

      align-items:center;
    }

    /* Original screen size preserved */

    .mobile-frame{

      width:390px;

      height:844px;

      max-width:100%;

      max-height:100vh;

      overflow:hidden;

      background:#0d1b8c;

      border-radius:28px;

      box-shadow:0 12px 35px rgba(0,0,0,0.25);

      display:flex;

      flex-direction:column;

      justify-content:center;

      position:relative;
    }

    .screen{

      padding:30px 20px;

      color:white;

      text-align:center;
    }

    /* Logo */

    .logo{

      width:100px;

      height:100px;

      border-radius:50%;

      background:linear-gradient(135deg,#5f6cff,#2ee6c9);

      display:flex;

      align-items:center;

      justify-content:center;

      margin:40px auto 20px;

      font-size:40px;

      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    h1{

      font-size:24px;

      font-weight:700;

      margin-bottom:10px;
    }

    h2{

      margin-top:24px;

      font-size:30px;

      font-weight:600;
    }

    p{

      font-size:14px;

      opacity:0.8;

      margin-bottom:24px;
    }

    /* Form */

    form{

      width:100%;
    }

    .form-control{

      border-radius:30px;

      text-align:center;

      background:rgba(255,255,255,0.18);

      border:none;

      color:white;

      margin:12px 0;

      padding:14px;

      font-size:15px;

      font-weight:600;

      backdrop-filter:blur(5px);
    }

    .form-control:focus{

      background:rgba(255,255,255,0.22);

      color:white;

      box-shadow:none;

      border:none;
    }

    .form-control::placeholder{

      color:rgba(255,255,255,0.7);
    }

    /* Login Button */

    .btn-login{

      margin-top:18px;

      border-radius:30px;

      padding:12px 30px;

      background:#cfd8dc;

      border:none;

      color:#333;

      font-weight:700;

      width:100%;

      transition:0.2s;
    }

    .btn-login:hover{

      background:white;
    }

    a{

      color:#cfd8dc;

      font-size:13px;

      text-decoration:underline;
    }

    .small-text{

      margin-top:14px;

      font-size:13px;
    }

    /* ───────────── Responsive Support ───────────── */

    /* Tablets */

    @media (max-width:1024px){

      body{
        padding:10px;
      }

      .mobile-frame{

        width:390px;
        height:844px;

        max-width:100%;
        max-height:100vh;
      }

    }

    /* Mobile Portrait */

    @media (max-width:768px){

      body{
        padding:0;
      }

      .mobile-frame{

        width:100%;

        height:100vh;

        border-radius:0;

        max-width:100%;
      }

      .screen{

        padding:24px 20px;
      }

    }

    /* Mobile Landscape */

    @media (max-height:500px) and (orientation:landscape){

      body{
        padding:0;
      }

      .mobile-frame{

        width:100%;

        height:100vh;

        border-radius:0;

        overflow-y:auto;
      }

      .screen{

        padding:20px;
      }

      .logo{

        margin-top:10px;

        width:80px;
        height:80px;

        font-size:32px;
      }

      h2{
        margin-top:10px;
      }

    }

    /* Large Screens / Nest Hub / Desktop */

    @media (min-width:1200px){

      .app-wrapper{

        min-height:100vh;
      }

      .mobile-frame{

        transform:scale(1);

      }

    }

    /* Ultra Wide Displays */

    @media (min-width:1600px){

      .mobile-frame{

        transform:scale(1.02);

      }

    }

  </style>
</head>

<body>
  <div class="mobile-frame">
    <div class="screen">
      <div class="logo">
        🎓
      </div>

      <h1>Study Planner</h1>

      <h2>Welcome Back!</h2>

      <p>
        Organize your class, assignment, and exam
      </p>

      <form method="POST" action="/">

        <input
          type="text"
          name="email"
          class="form-control"
          placeholder="Username"/>

        <input
          type="password"
          name="password"
          class="form-control"
          placeholder="Password"/>

        <button type="submit" class="btn btn-login">
          Log In
        </button>

      </form>

      <div class="mt-4">
        <a href="#">Forgot Password?</a>
      </div>

      <div class="small-text">
        Don’t have an account?
        <a href="#">Sign up</a>
      </div>
    </div>
  </div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
