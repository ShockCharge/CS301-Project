<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Study Planner Login</title>

  <!-- Bootstrap -->

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Google Font -->

  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>

    *{
      box-sizing:border-box;
    }

    body{

      margin:0;

      min-height:100vh;

      font-family:'Nunito',sans-serif;

      /* Removed white background */

      background:
      linear-gradient(135deg,#08145f,#0d1b8c,#1736d8);

      display:flex;
      justify-content:center;
      align-items:center;

      padding:20px;

      overflow-x:hidden;
    }

    /* Main Responsive Wrapper */

    .login-wrapper{

      width:100%;

      max-width:1700px;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    /* Main Login Card */

    .mobile-frame{

      width:100%;

      max-width:1300px;

      min-height:92vh;

      background:
      linear-gradient(180deg,#0d1b8c,#1629b8);

      border-radius:34px;

      overflow:hidden;

      position:relative;

      display:flex;
      justify-content:center;
      align-items:center;

      box-shadow:0 18px 50px rgba(0,0,0,0.35);
    }

    /* Decorative Overlay */

    .mobile-frame::before{

      content:"";

      position:absolute;

      inset:0;

      background:
      radial-gradient(circle at top right,
      rgba(255,255,255,0.12),
      transparent 40%);

      pointer-events:none;
    }

    /* Main Content */

    .screen{

      width:100%;

      max-width:620px;

      padding:55px 40px;

      color:white;

      text-align:center;

      position:relative;

      z-index:2;
    }

    /* Logo */

    .logo{

      width:115px;
      height:115px;

      border-radius:50%;

      background:
      linear-gradient(135deg,#5f6cff,#2ee6c9);

      display:flex;
      align-items:center;
      justify-content:center;

      margin:0 auto 28px;

      font-size:46px;

      box-shadow:0 12px 30px rgba(0,0,0,0.25);
    }

    /* Headings */

    h1{

      font-size:34px;

      font-weight:800;

      margin-bottom:10px;
    }

    h2{

      margin-top:24px;

      font-size:44px;

      font-weight:800;

      margin-bottom:12px;
    }

    p{

      font-size:16px;

      opacity:0.88;

      margin-bottom:34px;
    }

    /* Form */

    form{
      width:100%;
    }

    .form-control{

      border-radius:40px;

      text-align:center;

      background:rgba(255,255,255,0.15);

      border:1px solid rgba(255,255,255,0.12);

      color:white;

      margin-bottom:20px;

      padding:16px 20px;

      font-size:15px;

      backdrop-filter:blur(10px);

      transition:0.25s ease;
    }

    .form-control:focus{

      background:rgba(255,255,255,0.2);

      color:white;

      border-color:rgba(255,255,255,0.3);

      box-shadow:0 0 0 0.2rem rgba(255,255,255,0.08);
    }

    .form-control::placeholder{

      color:rgba(255,255,255,0.75);
    }

    /* Login Button */

    .btn-login{

      width:100%;

      border-radius:40px;

      padding:15px;

      background:#ffffff;

      border:none;

      color:#0d1b8c;

      font-weight:800;

      font-size:16px;

      transition:0.3s ease;
    }

    .btn-login:hover{

      background:#dfe6ff;

      transform:translateY(-2px);
    }

    /* Links */

    a{

      color:#dfe6ff;

      font-size:15px;

      text-decoration:underline;

      font-weight:600;
    }

    .small-text{

      margin-top:22px;

      font-size:15px;
    }

    /* =========================
       RESPONSIVE DESIGN
    ========================== */

    /* Tablets */

    @media (max-width:992px){

      .mobile-frame{

        max-width:900px;

        min-height:auto;
      }

      .screen{

        max-width:700px;

        padding:48px 34px;
      }

      h2{
        font-size:38px;
      }
    }

    /* Mobile */

    @media (max-width:768px){

      body{
        padding:0;
      }

      .mobile-frame{

        max-width:100%;

        min-height:100vh;

        border-radius:0;
      }

      .screen{

        padding:40px 24px;
      }

      h1{
        font-size:28px;
      }

      h2{
        font-size:34px;
      }

      p{
        font-size:15px;
      }

      .logo{

        width:95px;
        height:95px;

        font-size:40px;
      }

      .form-control{

        padding:14px 18px;
      }
    }

    /* Small Phones */

    @media (max-width:576px){

      .screen{
        padding:34px 20px;
      }

      h1{
        font-size:24px;
      }

      h2{
        font-size:30px;
      }

      .logo{

        width:85px;
        height:85px;

        font-size:36px;
      }

      .btn-login{

        padding:14px;

        font-size:15px;
      }
    }

    /* Landscape Phones & Tablets */

    @media (max-height:700px)
    and (orientation:landscape){

      body{
        padding:10px;
      }

      .mobile-frame{

        min-height:auto;

        max-width:1100px;
      }

      .screen{

        padding:28px 30px;
      }

      .logo{

        margin-bottom:18px;
      }

      h2{
        margin-top:12px;
      }

      p{
        margin-bottom:24px;
      }
    }

    /* Big Screens */

    @media (min-width:1400px){

      .mobile-frame{

        max-width:1500px;
      }

      .screen{

        max-width:760px;

        padding:65px 45px;
      }

      h1{
        font-size:38px;
      }

      h2{
        font-size:50px;
      }

      p{
        font-size:18px;
      }

      .form-control{

        font-size:16px;

        padding:18px 22px;
      }

      .btn-login{

        font-size:17px;

        padding:16px;
      }
    }

    /* Ultra Wide Screens */

    @media (min-width:1800px){

      .mobile-frame{

        max-width:1650px;
      }

      .screen{

        transform:scale(1.02);
      }
    }

  </style>

</head>

<body>

<div class="login-wrapper">

  <div class="mobile-frame">

    <div class="screen">

      <!-- Logo -->

      <div class="logo">
        🎓
      </div>

      <!-- Title -->

      <h1>
        Study Planner
      </h1>

      <!-- Welcome -->

      <h2>
        Welcome Back!
      </h2>

      <p>
        Organize your class, assignment, and exam
      </p>

      <!-- Login Form -->

      <form method="POST" action="/">

        <input
          type="text"
          name="email"
          class="form-control"
          placeholder="Username"
        >

        <input
          type="password"
          name="password"
          class="form-control"
          placeholder="Password"
        >

        <button
          type="submit"
          class="btn btn-login"
        >

          Log In

        </button>

      </form>

      <!-- Forgot Password -->

      <div class="mt-4">

        <a href="#">
          Forgot Password?
        </a>

      </div>

      <!-- Sign Up -->

      <div class="small-text">

        Don’t have an account?

        <a href="#">
          Sign up
        </a>

      </div>

    </div>

  </div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
