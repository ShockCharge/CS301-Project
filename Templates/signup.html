<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Lato", sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 55%, #2563eb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .signup-shell {
            width: 100%;
            max-width: 520px;
        }

        /* Brand */
        .signup-brand {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .signup-brand-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 0.75rem;
        }
        .signup-brand h1 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 900;
            margin: 0 0 0.2rem;
        }
        .signup-brand p {
            color: rgba(255,255,255,0.72);
            font-size: 0.9rem;
            margin: 0;
        }

        /* Card */
        .signup-card {
            background: #fff;
            border-radius: 24px;
            padding: 2rem 2rem 1.75rem;
            box-shadow: 0 24px 60px rgba(0,0,0,0.3);
        }

        .signup-card h2 {
            font-size: 1.25rem;
            font-weight: 900;
            color: #0f172a;
            margin: 0 0 1.25rem;
        }

        /* Error */
        .signup-error {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.88rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
        }

        /* Form rows */
        .form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.85rem;
        }

        .sp-field {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            margin-bottom: 0.85rem;
        }
        .sp-field label {
            font-size: 0.82rem;
            font-weight: 700;
            color: #1e293b;
        }

        .sp-input-wrap {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border: 1.5px solid #dbe4f0;
            border-radius: 10px;
            background: #fff;
            padding: 0 0.875rem;
            min-height: 46px;
            transition: border-color 0.2s;
        }
        .sp-input-wrap:focus-within {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
        }
        .sp-input-wrap i { color: #2563eb; font-size: 0.95rem; flex-shrink: 0; }
        .sp-input-wrap input,
        .sp-input-wrap select {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-family: "Lato", sans-serif;
            font-size: 0.92rem;
            color: #0f172a;
        }
        .sp-input-wrap input::placeholder { color: #94a3b8; }
        .sp-input-wrap select option { color: #0f172a; }

        .pw-toggle {
            cursor: pointer;
            color: #94a3b8;
            font-size: 0.95rem;
            flex-shrink: 0;
            transition: color 0.2s;
        }
        .pw-toggle:hover { color: #2563eb; }

        /* Submit */
        .sp-submit {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 900;
            font-family: "Lato", sans-serif;
            cursor: pointer;
            margin-top: 0.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: opacity 0.2s, transform 0.15s;
            box-shadow: 0 8px 24px rgba(37,99,235,0.3);
        }
        .sp-submit:hover { opacity: 0.92; transform: translateY(-1px); }

        /* Login link */
        .signup-login-note {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.875rem;
            color: #64748b;
        }
        .signup-login-note a {
            color: #2563eb;
            font-weight: 700;
            text-decoration: none;
        }
        .signup-login-note a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .signup-card { padding: 1.5rem 1.25rem; border-radius: 20px; }
            .form-row-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="signup-shell">

        <!-- Brand -->
        <div class="signup-brand">
            <div class="signup-brand-icon">🎓</div>
            <h1>Study Planner</h1>
            <p>Your all-in-one student workspace</p>
        </div>

        <!-- Card -->
        <div class="signup-card">
            <h2>Create your account</h2>

            {% if error %}
            <div class="signup-error">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('signup') }}" id="signup-form">

                <div class="form-row-2">
                    <div class="sp-field">
                        <label for="first-name">First Name</label>
                        <div class="sp-input-wrap">
                            <i class="bi bi-person"></i>
                            <input type="text" id="first-name" name="first_name" placeholder="First" required>
                        </div>
                    </div>
                    <div class="sp-field">
                        <label for="last-name">Last Name</label>
                        <div class="sp-input-wrap">
                            <i class="bi bi-person"></i>
                            <input type="text" id="last-name" name="last_name" placeholder="Last" required>
                        </div>
                    </div>
                </div>

                <div class="sp-field">
                    <label for="email">Email Address</label>
                    <div class="sp-input-wrap">
                        <i class="bi bi-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                    </div>
                </div>

                <div class="sp-field">
                    <label for="password">Password</label>
                    <div class="sp-input-wrap">
                        <i class="bi bi-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Min 8 chars, 1 uppercase, 1 number" required>
                        <i class="bi bi-eye pw-toggle" id="toggle-password"></i>
                    </div>
                </div>

                <div class="sp-field">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="sp-input-wrap">
                        <i class="bi bi-lock"></i>
                        <input type="password" id="confirm-password" name="confirm_password" placeholder="Repeat password" required>
                        <i class="bi bi-eye pw-toggle" id="toggle-confirm"></i>
                    </div>
                </div>

                <div class="sp-field">
                    <label for="phone">Phone Number</label>
                    <div class="sp-input-wrap">
                        <i class="bi bi-telephone"></i>
                        <input type="tel" id="phone" name="phone" placeholder="+64 21 123 4567">
                    </div>
                </div>

                <div class="sp-field">
                    <label for="institution">Institution / University</label>
                    <div class="sp-input-wrap">
                        <i class="bi bi-building"></i>
                        <input type="text" id="institution" name="institution" placeholder="Your school or university" required>
                    </div>
                </div>

                <div class="sp-field">
                    <label for="major">Major / Field of Study</label>
                    <div class="sp-input-wrap">
                        <i class="bi bi-book"></i>
                        <input type="text" id="major" name="major" placeholder="Your major or field" required>
                    </div>
                </div>

                <button type="submit" class="sp-submit">
                    <i class="bi bi-person-plus"></i> Create Account
                </button>
            </form>

            <p class="signup-login-note">
                Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
            </p>
        </div>
    </div>

    <script>
        // Password toggles
        document.getElementById('toggle-password').addEventListener('click', function() {
            const inp = document.getElementById('password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });
        document.getElementById('toggle-confirm').addEventListener('click', function() {
            const inp = document.getElementById('confirm-password');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        // Client-side confirm check
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            if (document.getElementById('password').value !== document.getElementById('confirm-password').value) {
                e.preventDefault();
                alert('Passwords do not match!');
            }
        });
    </script>
</body>
</html>
