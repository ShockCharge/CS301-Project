<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/signup.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="auth-shell">

    <!-- Brand -->
    <div class="auth-brand">
        <div class="auth-brand-icon">
            <i class="bi bi-mortarboard-fill"></i>
        </div>
        <h1>Study Planner</h1>
        <p>Your all-in-one student workspace</p>
    </div>

    <!-- Card -->
    <div class="auth-card">
        <p class="auth-card-title">Create your account</p>

        {% if error %}
        <div class="auth-alert auth-alert-error">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('signup') }}" id="signup-form" novalidate>

            <!-- Name row -->
            <div class="field-row-2">
                <div class="sp-field">
                    <label for="first-name">First Name</label>
                    <div class="sp-input-wrap">
                        <i class="bi bi-person field-icon"></i>
                        <input type="text" id="first-name" name="first_name" placeholder="First" required autocomplete="given-name">
                    </div>
                </div>
                <div class="sp-field">
                    <label for="last-name">Last Name</label>
                    <div class="sp-input-wrap">
                        <i class="bi bi-person field-icon"></i>
                        <input type="text" id="last-name" name="last_name" placeholder="Last" required autocomplete="family-name">
                    </div>
                </div>
            </div>

            <div class="sp-field">
                <label for="email">Email Address</label>
                <div class="sp-input-wrap">
                    <i class="bi bi-envelope field-icon"></i>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>
            </div>

            <div class="sp-field">
                <label for="password">Password</label>
                <div class="sp-input-wrap">
                    <i class="bi bi-lock field-icon"></i>
                    <input type="password" id="password" name="password" placeholder="Min 8 chars, 1 uppercase, 1 number" required autocomplete="new-password">
                    <button type="button" class="pw-toggle-btn" id="toggle-password" aria-label="Toggle password visibility">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="sp-field">
                <label for="confirm-password">Confirm Password</label>
                <div class="sp-input-wrap">
                    <i class="bi bi-lock field-icon"></i>
                    <input type="password" id="confirm-password" name="confirm_password" placeholder="Repeat your password" required autocomplete="new-password">
                    <button type="button" class="pw-toggle-btn" id="toggle-confirm" aria-label="Toggle confirm password visibility">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="sp-field">
                <label for="phone">Phone Number</label>
                <div class="sp-input-wrap">
                    <i class="bi bi-telephone field-icon"></i>
                    <input type="tel" id="phone" name="phone" placeholder="+64 21 123 4567" autocomplete="tel">
                </div>
            </div>

            <div class="auth-divider">Academic details</div>

            <div class="sp-field">
                <label for="institution">Institution / University</label>
                <div class="sp-input-wrap">
                    <i class="bi bi-building field-icon"></i>
                    <input type="text" id="institution" name="institution" placeholder="Your school or university" required>
                </div>
            </div>

            <div class="sp-field">
                <label for="major">Major / Field of Study</label>
                <div class="sp-input-wrap">
                    <i class="bi bi-book field-icon"></i>
                    <input type="text" id="major" name="major" placeholder="e.g. Computer Science" required>
                </div>
            </div>

            <button type="submit" class="sp-submit">
                <i class="bi bi-person-check-fill"></i>
                Create Account
            </button>
        </form>

        <p class="auth-switch">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </p>
    </div>
</div>

<script src="{{ url_for('static', filename='js/signup.js') }}"></script>
</body>
</html>
