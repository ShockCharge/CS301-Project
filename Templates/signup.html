<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Study Planner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/signup.css') }}">
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <h1>Create Account</h1>
            <p>Join Study Planner today</p>
        </div>

        <div class="signup-body">
            {% if error %}
            <div class="error-message">
                <i class="bi bi-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('signup') }}" id="signup-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first-name">First Name</label>
                        <div class="input-group">
                            <i class="bi bi-person"></i>
                            <input type="text" id="first-name" name="first_name" class="form-control" placeholder="First" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="last-name">Last Name</label>
                        <div class="input-group">
                            <i class="bi bi-person"></i>
                            <input type="text" id="last-name" name="last_name" class="form-control" placeholder="Last" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-group">
                        <i class="bi bi-envelope"></i>
                        <input type="email" id="email" name="email" class="form-control"  required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <i class="bi bi-lock"></i>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
                        <i class="bi bi-eye password-toggle" id="toggle-password"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-group">
                        <i class="bi bi-lock"></i>
                        <input type="password" id="confirm-password" name="confirm_password" class="form-control" placeholder="Confirm password" required>
                        <i class="bi bi-eye password-toggle" id="toggle-confirm-password"></i>
                    </div>
                </div>

                <button type="submit" class="btn-signup">
                    <i class="bi bi-person-plus"></i> Create Account
                </button>
            </form>

            <div class="divider">
                <span>or sign up with</span>
            </div>

            <div class="social-signup">
                <button class="social-btn google-btn">
                    <i class="bi bi-google"></i>
                    Google
                </button>
                <button class="social-btn facebook-btn">
                    <i class="bi bi-facebook"></i>
                    Facebook
                </button>
            </div>

            <div class="login-link">
                Already have an account? <a href="{{ url_for('login') }}">Sign In</a>
            </div>

            <div class="terms">
                By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </div>
        </div>
    </div>

    <script>
        // Password toggle
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        document.getElementById('toggle-confirm-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('confirm-password');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        // Form validation
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match!');
            }
        });
    </script>
</body>
