<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI-Powered Study Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="brand-title">Study Planner</h1>
            <h2 class="auth-subtitle">Create your account</h2>
            <p class="auth-description">Start organizing your study life with personalized AI plans.</p>
            
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="Email" required class="form-input">
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Password" required class="form-input">
                </div>
                <div class="form-group">
                    <input type="password" name="confirm_password" placeholder="Confirm Password" required class="form-input">
                </div>
                
                {% if error %}
                    <p class="error-message">{{ error }}</p>
                {% endif %}
                
                <button type="submit" class="btn-primary">Sign up</button>
                <button type="button" class="btn-secondary" id="connect-calendar">Connect Calendar</button>
            </form>
            
            <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}" class="link">Sign in</a></p>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
