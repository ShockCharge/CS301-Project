<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Study Planner – Profile</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'Nunito', sans-serif;
      background: linear-gradient(135deg,#08145f,#1a2a9e);
      padding:20px;
      overflow-x:hidden;
    }

    /* Main Responsive Container */

    .profile-container{
      width:100%;
      max-width:1600px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    /* Main Screen */

    .phone-screen{
      width:100%;
      max-width:1300px;
      min-height:95vh;
      background: linear-gradient(180deg,#1a2a9e,#2844d8);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      position:relative;
      border-radius:32px;
      box-shadow:0 15px 40px rgba(0,0,0,0.35);
    }

    /* ───────── Top Nav ───────── */

    .top-nav{
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 28px 16px;
      flex-shrink:0;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .top-nav .app-title{
      font-size:22px;
      font-weight:800;
      color:white;
    }

    .datetime{
      text-align:center;
      line-height:1.4;
    }

    .datetime .time{
      font-size:18px;
      font-weight:800;
      color:white;
    }

    .datetime .date{
      font-size:12px;
      font-weight:600;
      color:rgba(255,255,255,.85);
    }

    /* Hamburger */

    .hamburger{
      display:flex;
      flex-direction:column;
      gap:5px;
      cursor:pointer;
    }

    .hamburger span{
      width:26px;
      height:3px;
      background:white;
      border-radius:3px;
    }

    /* ───────── Scrollable Body ───────── */

    .app-body{
      flex:1;
      overflow-y:auto;
      padding:40px 30px 30px;
      scrollbar-width:none;
    }

    .app-body::-webkit-scrollbar{
      display:none;
    }

    /* ───────── Avatar ───────── */

    .avatar-wrap{
      display:flex;
      justify-content:center;
      margin-bottom:20px;
      position:relative;
    }

    .avatar-circle{
      width:130px;
      height:130px;
      border-radius:50%;
      background:rgba(255,255,255,0.15);
      display:flex;
      align-items:flex-end;
      justify-content:center;
      overflow:hidden;
      border:4px solid rgba(255,255,255,0.25);
      backdrop-filter:blur(10px);
    }

    .avatar-circle svg{
      width:95px;
      height:95px;
    }

    .edit-badge{
      position:absolute;
      bottom:4px;
      left:calc(50% + 38px);
      width:40px;
      height:40px;
      background:#ffffff;
      border-radius:50%;
      border:3px solid #1a2a9e;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:0.3s ease;
    }

    .edit-badge:hover{
      transform:scale(1.05);
    }

    .edit-badge svg{
      width:16px;
      height:16px;
      stroke:#1a2a9e;
      fill:none;
    }

    /* ───────── Email ───────── */

    .profile-email{
      text-align:center;
      color:white;
      font-size:18px;
      font-weight:700;
      margin-bottom:35px;
      word-break:break-word;
    }

    /* ───────── Stats Grid ───────── */
    .stats-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .stat-card{
      background: rgba(255,255,255,0.12);
      border-radius:22px;
      padding:22px;
      transition:0.3s ease;
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.08);
    }

    .stat-card:hover{
      transform:translateY(-4px);
      background: rgba(255,255,255,0.16);
    }

    .card-header-row{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
    }

    .card-icon{
      font-size:22px;
    }

    .card-label{
      color:#d9e2ff;
      font-size:14px;
      font-weight:700;
    }

    .card-value{
      color:white;
      font-size:36px;
      font-weight:800;
      margin-bottom:6px;
    }

    .card-sub{
      color:#b9c7ff;
      font-size:12px;
      font-weight:600;
    }

    /* ───────── Action Rows ───────── */

    .actions-wrapper{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .action-row{
      background: rgba(255,255,255,0.12);
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:18px 20px;
      cursor:pointer;
      transition:0.3s ease;
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.08);
    }

    .action-row:hover{
      transform:translateY(-3px);
      background: rgba(255,255,255,0.16);
    }

    .row-left{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .row-icon{
      font-size:22px;
    }

    .row-label{
      color:white;
      font-size:16px;
      font-weight:700;
    }

    .row-chevron{
      color:#d9e2ff;
      font-size:24px;
      font-weight:700;
    }

    /* ───────── Responsive ───────── */

    /* Tablet */
    @media (max-width:992px){

      .phone-screen{
        max-width:100%;
      }

      .stats-grid{
        grid-template-columns:repeat(2,1fr);
      }
    }

    /* Mobile */
    @media (max-width:768px){

      body{
        padding:0;
      }

      .phone-screen{
        max-width:100%;
        min-height:100vh;
        border-radius:0;
      }

      .top-nav{
        padding:18px 20px 14px;
      }

      .top-nav .app-title{
        font-size:18px;
      }

      .app-body{
        padding:30px 20px 24px;
      }

      .stats-grid{
        grid-template-columns:1fr;
      }

      .profile-email{
        font-size:16px;
      }

      .card-value{
        font-size:30px;
      }
    }

    /* Small Phones */

    @media (max-width:576px){

      .avatar-circle{
        width:110px;
        height:110px;
      }

      .avatar-circle svg{
        width:80px;
        height:80px;
      }

      .edit-badge{
        width:36px;
        height:36px;
        left:calc(50% + 30px);
      }

      .row-label{
        font-size:15px;
      }
    }

    /* Big Screens */

    @media (min-width:1400px){

      .phone-screen{
        max-width:1500px;
      }

      .app-body{
        padding:50px 40px 40px;
      }

      .profile-email{
        font-size:20px;
      }

      .card-value{
        font-size:42px;
      }

      .row-label{
        font-size:18px;
      }
    }

    /* Ultra Wide Screens */
    @media (min-width:1800px){

      .phone-screen{
        max-width:1700px;
      }

      .card-value{
        font-size:48px;
      }
    }
  </style>
</head>

<body>

<div class="profile-container">
  <div class="phone-screen">

    <!-- Top Nav -->
    <div class="top-nav">
      <div class="app-title">
        Study Planner
      </div>

      <div class="datetime text-center">
        <div class="time" id="liveTime"></div>
        <div class="date" id="liveDate"></div>
      </div>

      <div class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <!-- Scrollable Body -->
    <div class="app-body">

      <!-- Avatar -->
      <div class="avatar-wrap">
        <div class="avatar-circle">

          <svg
            viewBox="0 0 80 80"
            xmlns="http://www.w3.org/2000/svg">

            <circle
              cx="40"
              cy="28"
              r="16"
              fill="#8fb0ff"/>

            <ellipse
              cx="40"
              cy="72"
              rx="28"
              ry="18"
              fill="#8fb0ff"/>

          </svg>

        </div>

        <div class="edit-badge">

          <svg
            viewBox="0 0 24 24"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round">

            <path
              d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>

            <path
              d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>

          </svg>

        </div>

      </div>

      <!-- Email -->

      <div class="profile-email">
        {{ session['user'] }}
      </div>

      <!-- Stats -->

      <div class="stats-grid">

        <div class="stat-card">

          <div class="card-header-row">

            <span class="card-icon">👀</span>

            <span class="card-label">
              Pending Tasks
            </span>

          </div>

          <div class="card-value">
            0
          </div>

          <div class="card-sub">
            Last 7 Days
          </div>

        </div>

        <div class="stat-card">

          <div class="card-header-row">

            <span class="card-icon">⚠️</span>

            <span class="card-label">
              Overdue Tasks
            </span>

          </div>

          <div class="card-value">
            0
          </div>

          <div class="card-sub">
            Total
          </div>

        </div>

        <div class="stat-card">

          <div class="card-header-row">

            <span class="card-icon">✨</span>

            <span class="card-label">
              Tasks Completed
            </span>

          </div>

          <div class="card-value">
            0
          </div>

          <div class="card-sub">
            Last 7 Days
          </div>

        </div>

        <div class="stat-card">

          <div class="card-header-row">

            <span class="card-icon">🔥</span>

            <span class="card-label">
              Study Streaks
            </span>

          </div>

          <div class="card-value">
            0
          </div>

          <div class="card-sub">
            Total Streak
          </div>

        </div>

      </div>

      <!-- Action Rows -->

      <div class="actions-wrapper">

        <div class="action-row">

          <div class="row-left">

            <span class="row-icon">🚪</span>

            <span class="row-label">
              Log Out
            </span>

          </div>

          <span class="row-chevron">
            ›
          </span>

        </div>

        <div class="action-row">

          <div class="row-left">

            <span class="row-icon">👑</span>

            <span class="row-label">
              Premium Subscription
            </span>

          </div>

          <span class="row-chevron">
            ›
          </span>

        </div>

        <div class="action-row">

          <div class="row-left">

            <span class="row-icon">🗑️</span>

            <span class="row-label">
              Delete Account
            </span>

          </div>

          <span class="row-chevron">
            ›
          </span>

        </div>

      </div>

    </div>

  </div>

</div>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

  function updateClock(){
    const now = new Date();
    let h = now.getHours();
    const m = String(now.getMinutes()).padStart(2,'0');
    const ampm = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    document.getElementById('liveTime').textContent =
      `${h}.${m} ${ampm}`;

    const days = [
      'Sunday',
      'Monday',
      'Tuesday',
      'Wednesday',
      'Thursday',
      'Friday',
      'Saturday'
    ];

    const months = [
      'January',
      'February',
      'March',
      'April',
      'May',
      'June',
      'July',
      'August',
      'September',
      'October',
      'November',
      'December'
    ];

    document.getElementById('liveDate').textContent =
      `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
  }

  updateClock();
  setInterval(updateClock,1000);
</script>

</body>
</html>
