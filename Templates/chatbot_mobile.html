<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Study Planner – AI Chat</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:'Nunito', sans-serif;
      background: linear-gradient(135deg,#08145f,#1e3a9e);
      padding:20px;
      overflow-x:hidden;
    }

    /* Main Responsive Container */

    .chat-container{
      width:100%;
      max-width:1600px;
      height:95vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    /* Main Screen */

    .phone-screen{
      width:100%;
      max-width:1350px;
      height:100%;
      background: linear-gradient(180deg,#1e3a9e,#2747c7);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border-radius:32px;
      box-shadow:0 15px 40px rgba(0,0,0,0.35);
    }

    /* ───────── Header ───────── */

    .app-chrome{
      background:transparent;
      padding-top:16px;
      flex-shrink:0;
    }

    /* Top Navigation */

    .top-nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 28px 20px;
      color:white;
    }

    .app-title{
      font-size:22px;
      font-weight:800;
    }

    .datetime{
      text-align:center;
      line-height:1.4;
    }

    .datetime .time{
      font-size:18px;
      font-weight:800;
    }

    .datetime .date{
      font-size:12px;
      font-weight:600;
      opacity:0.85;
    }

    /* Hamburger */
    .hamburger{
      display:flex;
      flex-direction:column;
      gap:5px;
      cursor:pointer;
    }

    .hamburger span{
      width:26px;
      height:3px;
      background:white;
      border-radius:5px;
    }

    /* Heading */

    .page-heading{
      color:white;
      font-size:38px;
      font-weight:800;
      text-align:center;
      padding:15px 20px 32px;
      line-height:1.4;
    }

    /* ───────── Chat Area ───────── */

    .chat-pane{
      flex:1;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
      border-radius:34px 34px 0 0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border-top:1px solid rgba(255,255,255,0.12);
    }

    .chat-messages{
      flex:1;
      overflow-y:auto;
      padding:30px;
      display:flex;
      flex-direction:column;
      gap:16px;
      scrollbar-width:none;
    }

    .chat-messages::-webkit-scrollbar{
      display:none;
    }

    /* Message Bubbles */

    .user-bubble{
      align-self:flex-end;
      background:#ffffff;
      color:#1e3a9e;
      border-radius:22px 22px 6px 22px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      max-width:70%;
      word-break:break-word;
      box-shadow:0 4px 14px rgba(0,0,0,0.08);
    }

    .ai-bubble{
      align-self:flex-start;
      background: rgba(255,255,255,0.18);
      color:white;
      border-radius:22px 22px 22px 6px;
      padding:14px 18px;
      font-size:15px;
      font-weight:600;
      max-width:70%;
      word-break:break-word;
      backdrop-filter: blur(10px);
    }

    /* Input Area */
    .chat-input-bar{
      padding:22px 24px 28px;
      background:transparent;
    }

    .input-wrap{
      display:flex;
      align-items:center;
      background: rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:35px;
      padding:10px 12px 10px 22px;
      gap:12px;
      backdrop-filter: blur(12px);
      box-shadow:0 6px 18px rgba(0,0,0,0.12);
    }

    .input-wrap input{
      flex:1;
      border:none;
      outline:none;
      background:transparent;
      font-family:'Nunito', sans-serif;
      font-size:15px;
      font-weight:600;
      color:white;
    }

    .input-wrap input::placeholder{
      color:rgba(255,255,255,0.7);
    }

    /* Send Button */
    .send-btn{
      width:50px;
      height:50px;
      border:none;
      border-radius:50%;
      background:#ffffff;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:0.3s ease;
    }

    .send-btn:hover{
      transform:translateY(-2px);
      background:#dfe6ff;
    }

    .send-btn svg{
      width:22px;
      height:22px;
    }

    /* ───────── Responsive ───────── */

    /* Tablet */
    @media (max-width:992px){

      .page-heading{
        font-size:30px;
      }

      .chat-messages{
        padding:24px;
      }
    }

    /* Mobile */
    @media (max-width:768px){

      body{
        padding:0;
      }

      .chat-container{
        height:100vh;
      }

      .phone-screen{
        border-radius:0;
        height:100vh;
        max-width:100%;
      }

      .top-nav{
        padding:12px 18px 16px;
      }

      .app-title{
        font-size:18px;
      }

      .page-heading{

        font-size:24px;

        padding-bottom:24px;
      }

      .chat-pane{
        border-radius:28px 28px 0 0;
      }

      .user-bubble,
      .ai-bubble{
        max-width:88%;
      }

      .chat-input-bar{
        padding:18px;
      }
    }

    /* Small Phones */
    @media (max-width:576px){

      .page-heading{
        font-size:22px;
      }

      .chat-messages{
        padding:18px;
      }

      .user-bubble,
      .ai-bubble{
        font-size:14px;
      }

      .input-wrap{
        padding:8px 10px 8px 18px;
      }

      .send-btn{
        width:46px;
        height:46px;
      }
    }

    /* Big Screens */
    @media (min-width:1400px){

      .phone-screen{
        max-width:1500px;
      }

      .page-heading{
        font-size:44px;
      }

      .chat-messages{
        padding:40px;
      }

      .user-bubble,
      .ai-bubble{
        font-size:16px;
      }

      .input-wrap input{
        font-size:16px;
      }
    }

    /* Ultra Wide / TV Screens */

    @media (min-width:1800px){

      .phone-screen{
        max-width:1700px;
      }

      .page-heading{
        font-size:50px;
      }
    }

  </style>

</head>

<body>

<div class="chat-container">
  <div class="phone-screen">

    <!-- Header -->
    <div class="app-chrome">
      <div class="top-nav">
        <div class="app-title">
          Study Planner
        </div>

        <div class="datetime text-center">
          <div class="time" id="liveTime"></div>
          <div class="date" id="liveDate"></div>
        </div>

        <div class="hamburger">

          <span></span>
          <span></span>
          <span></span>

        </div>

      </div>

      <div class="page-heading">

        AI-Powered Cloud-Based<br>
        Study Planner

      </div>

    </div>

    <!-- Chat Area -->

    <div class="chat-pane">

      <div class="chat-messages" id="chatMessages">

      </div>

      <!-- Input -->

      <div class="chat-input-bar">

        <div class="input-wrap">

          <input
            type="text"
            id="chatInput"
            placeholder="Ask anything here"/>

          <button
            class="send-btn"
            onclick="sendMessage()">

            <svg
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">

              <path
                d="M12 20V4M12 4l-6 6M12 4l6 6"
                stroke="#1e3a9e"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                fill="none"\/>

            </svg>

          </button>

        </div>

      </div>

    </div>

  </div>

</div>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

  /* Live Clock */

  function updateClock(){
    const now = new Date();
    let h = now.getHours();
    const m = String(now.getMinutes()).padStart(2,'0');
    const ampm = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    document.getElementById('liveTime').textContent =
      `${h}.${m} ${ampm}`;

    const days = [
      'Sunday','Monday','Tuesday',
      'Wednesday','Thursday',
      'Friday','Saturday'
    ];

    const months = [
      'January','February','March','April',
      'May','June','July','August',
      'September','October','November','December'
    ];

    document.getElementById('liveDate').textContent =
      `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
  }
  updateClock();
  setInterval(updateClock,1000);

  /* Send Chat Message */
  function sendMessage(){
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if(!text) return;
    const messages =
      document.getElementById('chatMessages');

    /* User Bubble */

    const userBubble =
      document.createElement('div');
    userBubble.className =
      'user-bubble';
    userBubble.textContent =
      text
    messages.appendChild(userBubble);
    input.value = '';
    messages.scrollTop =
      messages.scrollHeight;

    /* Typing */
    const typing =
      document.createElement('div');
    typing.className =
      'ai-bubble';
    typing.textContent =
      'Typing...';
    messages.appendChild(typing);
    messages.scrollTop =
      messages.scrollHeight;

    /* Fake AI Reply */

    setTimeout(() => {
      typing.remove();
      const reply =
        document.createElement('div');
      reply.className =
        'ai-bubble';
      reply.textContent =
        "I'm your AI Study Planner! I can help you schedule tasks, review notes, and track your progress.";
      messages.appendChild(reply);
      messages.scrollTop =
        messages.scrollHeight;
    },1000);
  }

  /* Enter Key Support */
  document
    .getElementById('chatInput')
    .addEventListener('keydown', e => {
      if(e.key === 'Enter'){
        sendMessage();
      }
    });

</script>

</body>
</html>
