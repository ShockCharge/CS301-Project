<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Study Planner – AI Chat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css' ) }}">
  <style>

    .selector-for-some-widget {
      box-sizing: content-box;
    }

    .main-content {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; /* Full viewport height */
      padding: 0;
    }

    /* ── Screen only (no shell) ── */
    .phone-screen {
      width: 360px;
      height: 780px;
      background: #1e3a9e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── App Chrome ── */
    .app-chrome {
      background: #1e3a9e;
      padding-top: 14px;
      flex-shrink: 0;
    }

    /* Top Nav */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 20px 14px;
      color: #fff;
    }
    .top-nav .app-title { font-size: 17px; font-weight: 800; }
    .top-nav .datetime { text-align: center; line-height: 1.3; }
    .top-nav .datetime .time { font-size: 16px; font-weight: 800; }
    .top-nav .datetime .date { font-size: 10px; font-weight: 600; opacity: .85; }
    .hamburger { display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
    .hamburger span { display: block; width: 22px; height: 2.5px; background: #fff; border-radius: 2px; }

    /* Page Heading */
    .page-heading {
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      padding: 4px 24px 20px;
      line-height: 1.35;
    }

    /* ── Chat Pane ── */
    .chat-pane {
      flex: 1;
      background: #f0f2f8;
      border-radius: 26px 26px 12px 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 22px 18px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: none;
    }
    .chat-messages::-webkit-scrollbar { display: none; }

    /* Input bar */
    .chat-input-bar {
      padding: 10px 16px 16px;
      background: #f0f2f8;
      flex-shrink: 0;
    }
    .input-wrap {
      display: flex;
      align-items: center;
      background: #fff;
      border: 1.5px solid #c8cdd8;
      border-radius: 28px;
      padding: 8px 8px 8px 18px;
      gap: 8px;
    }
    .input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    .input-wrap input::placeholder { color: #aaa; }
    .send-btn {
      width: 38px;
      height: 38px;
      background: #111;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s;
    }
    .send-btn:hover { background: #333; }
  </style>
</head>
<body>

  <div class="phone-screen">

    <div class="app-chrome">
      <div class="top-nav">
        <div class="app-title">Study Planner</div>
        <div class="datetime text-center">
          <div class="time" id="liveTime"></div>
          <div class="date" id="liveDate"></div>
        </div>
        <div class="hamburger">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="page-heading">AI-Powered Cloud-Based<br>Study Planner</div>
    </div>

    <div class="chat-pane">
      <div class="chat-messages" id="chatMessages">
      </div>

      <div class="chat-input-bar">
        <div class="input-wrap">
          <input type="text" id="chatInput" placeholder="Ask anything here" />
          <button class="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 20V4M12 4l-6 6M12 4l6 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

  </div>

  
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function updateClock() {
    const now = new Date();
    let h = now.getHours();
    const m = String(now.getMinutes()).padStart(2, '0');
    const ampm = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;
    document.getElementById('liveTime').textContent = `${h}.${m} ${ampm}`;
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('liveDate').textContent =
      `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    const messages = document.getElementById('chatMessages');

    const userBubble = document.createElement('div');
    userBubble.style.cssText = `
      align-self:flex-end;background:#1e3a9e;color:#fff;
      border-radius:18px 18px 4px 18px;padding:9px 14px;
      font-size:13px;font-weight:600;max-width:75%;
      word-break:break-word;flex-shrink:0;
    `;
    userBubble.textContent = text;
    messages.appendChild(userBubble);
    input.value = '';
    messages.scrollTop = messages.scrollHeight;

    const typing = document.createElement('div');
    typing.style.cssText = `
      align-self:flex-start;background:#b0b8cc;
      border-radius:18px 18px 18px 4px;padding:9px 16px;
      font-size:13px;color:#555;font-weight:600;flex-shrink:0;
    `;
    typing.textContent = '…';
    messages.appendChild(typing);
    messages.scrollTop = messages.scrollHeight;

    setTimeout(() => {
      typing.remove();
      const reply = document.createElement('div');
      reply.style.cssText = `
        align-self:flex-start;background:#b0b8cc;
        border-radius:18px 18px 18px 4px;padding:9px 14px;
        font-size:13px;font-weight:600;color:#222;
        max-width:75%;word-break:break-word;flex-shrink:0;
      `;
      reply.textContent = "I'm your AI Study Planner! I can help you schedule tasks, review notes, and track your progress.";
      messages.appendChild(reply);
      messages.scrollTop = messages.scrollHeight;
    }, 1000);
  }

  document.getElementById('chatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });
</script>
</body>
</html>
