<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Study Planner - Sign Up</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Font -->
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>

    *{
      box-sizing:border-box;
    }

    body{

      margin:0;

      min-height:100vh;

      font-family:'Nunito',sans-serif;

      /* Removed white background */
      background: linear-gradient(135deg,#08145f,#0b1a8f);

      display:flex;
      justify-content:center;
      align-items:center;

      padding:20px;

      overflow-x:hidden;
    }

    /* Main Responsive Container */
    .mobile-frame{

      width:100%;
      max-width:420px;

      min-height:844px;

      background: linear-gradient(180deg,#0b1a8f,#1328c7);

      border-radius:32px;

      overflow:hidden;

      position:relative;

      box-shadow:0 15px 40px rgba(0,0,0,0.35);

      display:flex;
      justify-content:center;
      align-items:center;
    }

    .screen{

      width:100%;

      padding:35px 25px;

      color:white;

      text-align:center;

      overflow-y:auto;
    }

    /* Logo */
    .logo-circle{

      width:95px;
      height:95px;

      border-radius:50%;

      background: linear-gradient(135deg,#4facfe,#00f2fe);

      display:flex;
      justify-content:center;
      align-items:center;

      margin:10px auto 20px;

      font-size:42px;

      box-shadow:0 10px 25px rgba(0,0,0,0.25);
    }

    h4{
      font-weight:700;
      font-size:28px;
      margin-bottom:8px;
    }

    h2{
      font-weight:800;
      font-size:34px;
      margin-top:20px;
    }

    .subtitle{

      font-size:15px;

      opacity:0.85;

      margin-bottom:30px;
    }

    /* Inputs */
    .form-control{

      border-radius:30px;

      background: rgba(255,255,255,0.16);

      border:1px solid rgba(255,255,255,0.12);

      color:white;

      text-align:center;

      margin-bottom:18px;

      padding:14px 18px;

      font-size:15px;
    }

    .form-control:focus{

      background: rgba(255,255,255,0.2);

      color:white;

      border-color: rgba(255,255,255,0.3);

      box-shadow:none;
    }

    .form-control::placeholder{
      color: rgba(255,255,255,0.75);
    }

    /* Button */
    .btn-signup{

      width:100%;

      border-radius:30px;

      background:#ffffff;
      color:#0b1a8f;
      padding:13px;
      border:none;
      font-weight:700;
      margin-top:8px;
      transition:0.3s ease;
    }

    .btn-signup:hover{
      background:#dfe6ff;
      transform:translateY(-2px);
    }

    /* Bottom Text */
    .bottom-text{
      margin-top:22px;
      font-size:14px;
    }

    .bottom-text a{
      color:#dfe6ff;
      text-decoration:underline;
      font-weight:600;
    }

    /* ================= RESPONSIVE ================= */

    /* Tablets */
    @media (max-width:992px){

      .mobile-frame{
        max-width:500px;
        min-height:auto;
      }
    }

    /* Mobile */
    @media (max-width:576px){

      body{
        padding:0;
      }

      .mobile-frame{
        max-width:100%;
        min-height:100vh;
        border-radius:0;
      }

      .screen{
        padding:30px 20px;
      }

      h4{
        font-size:24px;
      }

      h2{
        font-size:30px;
      }

      .logo-circle{
        width:85px;
        height:85px;
        font-size:36px;
      }
    }

    /* Landscape Devices */
    @media (max-height:700px) and (orientation:landscape){

      body{
        padding:10px;
      }

      .mobile-frame{
        max-width:900px;
        min-height:auto;
      }

      .screen{
        padding:25px;
      }

      h2{
        margin-top:10px;
      }

      .subtitle{
        margin-bottom:20px;
      }
    }

    /* Big Screens / Nest Hub / TV */
    @media (min-width:1400px){

      .mobile-frame{
        transform:scale(1.05);
      }

      .screen{
        padding:45px 35px;
      }

      h2{
        font-size:38px;
      }

      .form-control{
        font-size:16px;
      }
    }

  </style>

</head>

<body>

  <div class="mobile-frame">

    <div class="screen">

      <!-- Logo -->
      <div class="logo-circle">
        🎓
      </div>

      <!-- Title -->
      <h4>Study Planner</h4>

      <!-- Welcome -->
      <h2>Welcome Back!</h2>

      <p class="subtitle">
        Organize your class, assignment, and exam
      </p>

      <!-- Form -->
      <form>
        <input
          type="text"
          class="form-control"
          placeholder="Name">

        <input
          type="email"
          class="form-control"
          placeholder="Email">

        <input
          type="text"
          class="form-control"
          placeholder="Phone Number">

        <input
          type="text"
          class="form-control"
          placeholder="Institute Name">

        <input
          type="password"
          class="form-control"
          placeholder="Password">

        <input
          type="password"
          class="form-control"
          placeholder="Confirm Password">

        <button type="submit" class="btn btn-signup">
          Sign Up
        </button>

      </form>

      <!-- Bottom -->
      <div class="bottom-text">

        Already have an account?
        <a href="#">Sign in</a>

      </div>

    </div>

  </div>

</body>
</html>
