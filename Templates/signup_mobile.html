<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Study Planner - Sign Up</title>

  <!-- Bootstrap -->

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Google Font -->

  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  >

  <style>

    *{
      box-sizing:border-box;
    }

    body{

      margin:0;

      min-height:100vh;

      font-family:'Nunito',sans-serif;

      /* Removed white background */

      background:
      linear-gradient(135deg,#08145f,#0b1a8f,#1636db);

      display:flex;
      justify-content:center;
      align-items:center;

      padding:20px;

      overflow-x:hidden;
    }

    /* Main Responsive Wrapper */

    .signup-wrapper{

      width:100%;

      max-width:1700px;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    /* Main Card */

    .mobile-frame{

      width:100%;

      max-width:1300px;

      min-height:92vh;

      background:
      linear-gradient(180deg,#0b1a8f,#1328c7);

      border-radius:34px;

      overflow:hidden;

      position:relative;

      display:flex;
      justify-content:center;
      align-items:center;

      box-shadow:0 18px 50px rgba(0,0,0,0.35);
    }

    /* Decorative Overlay */

    .mobile-frame::before{

      content:"";

      position:absolute;

      inset:0;

      background:
      radial-gradient(circle at top right,
      rgba(255,255,255,0.12),
      transparent 40%);

      pointer-events:none;
    }

    /* Content */

    .screen{

      width:100%;

      max-width:650px;

      padding:50px 40px;

      color:white;

      text-align:center;

      position:relative;

      z-index:2;
    }

    /* Logo */

    .logo-circle{

      width:110px;
      height:110px;

      border-radius:50%;

      background:
      linear-gradient(135deg,#4facfe,#00f2fe);

      display:flex;
      justify-content:center;
      align-items:center;

      margin:0 auto 24px;

      font-size:46px;

      box-shadow:0 12px 30px rgba(0,0,0,0.25);
    }

    /* Titles */

    h4{

      font-weight:700;

      font-size:32px;

      margin-bottom:10px;
    }

    h2{

      font-weight:800;

      font-size:42px;

      margin-top:18px;

      margin-bottom:12px;
    }

    .subtitle{

      font-size:16px;

      opacity:0.88;

      margin-bottom:34px;
    }

    /* Form */

    form{
      width:100%;
    }

    .form-control{

      border-radius:40px;

      background:rgba(255,255,255,0.15);

      border:1px solid rgba(255,255,255,0.14);

      color:white;

      text-align:center;

      margin-bottom:18px;

      padding:16px 20px;

      font-size:15px;

      backdrop-filter:blur(10px);

      transition:0.25s ease;
    }

    .form-control:focus{

      background:rgba(255,255,255,0.2);

      color:white;

      border-color:rgba(255,255,255,0.3);

      box-shadow:0 0 0 0.2rem rgba(255,255,255,0.08);
    }

    .form-control::placeholder{

      color:rgba(255,255,255,0.75);
    }

    /* Sign Up Button */

    .btn-signup{

      width:100%;

      border-radius:40px;

      background:white;

      color:#0b1a8f;

      padding:15px;

      border:none;

      font-weight:800;

      font-size:16px;

      margin-top:8px;

      transition:0.3s ease;
    }

    .btn-signup:hover{

      background:#dfe6ff;

      transform:translateY(-2px);
    }

    /* Bottom Text */

    .bottom-text{
      margin-top:24px;
      font-size:15px;
    }

    .bottom-text a{
      color:#dfe6ff;
      text-decoration:underline;
      font-weight:700;
    }

    /* =========================
       RESPONSIVE DESIGN
    ========================== */

    /* Tablets */

    @media (max-width:992px){
      .mobile-frame{
        max-width:900px;
        min-height:auto;
      }

      .screen{
        max-width:700px;
        padding:45px 32px;
      }

      h2{
        font-size:36px;
      }
    }

    /* Mobile */

    @media (max-width:768px){

      body{
        padding:0;
      }

      .mobile-frame{
        max-width:100%;
        min-height:100vh;
        border-radius:0;
      }

      .screen{
        padding:40px 24px;
      }

      h4{
        font-size:26px;
      }

      h2{
        font-size:34px;
      }

      .subtitle{
        font-size:15px;
      }

      .logo-circle{
        width:95px;
        height:95px;
        font-size:40px;
      }

      .form-control{
        padding:14px 18px;
      }
    }

    /* Small Phones */

    @media (max-width:576px){
      .screen{
        padding:34px 20px;
      }

      h4{
        font-size:22px;
      }

      h2{
        font-size:30px;
      }

      .logo-circle{
        width:85px;
        height:85px;
        font-size:36px;
      }

      .form-control{
        font-size:14px;
        padding:13px 16px;
      }

      .btn-signup{
        padding:14px;
        font-size:15px;
      }
    }

    /* Landscape Devices */
    @media (max-height:700px)
    and (orientation:landscape){

      body{
        padding:10px;
      }

      .mobile-frame{
        min-height:auto;
        max-width:1100px;
      }

      .screen{
        padding:28px 30px;
      }

      h2{
        margin-top:10px;
      }

      .subtitle{
        margin-bottom:24px;
      }
    }

    /* Large Desktop */
    @media (min-width:1400px){
      .mobile-frame{
        max-width:1500px;
      }

      .screen{
        max-width:760px;
        padding:60px 45px;
      }

      h4{
        font-size:36px;
      }

      h2{
        font-size:48px;
      }

      .subtitle{
        font-size:18px;
      }

      .form-control{
        font-size:16px;
        padding:18px 22px;
      }

      .btn-signup{
        font-size:17px;
        padding:16px;
      }
    }

    /* Ultra Wide Screens */

    @media (min-width:1800px){

      .mobile-frame{
        max-width:1650px;
      }

      .screen{
        transform:scale(1.05);
      }
    }
  </style>
</head>

<body>
<div class="signup-wrapper">
  <div class="mobile-frame">
    <div class="screen">

      <!-- Logo -->
      <div class="logo-circle">
        🎓
      </div>

      <!-- Title -->
      <h4>
        Study Planner
      </h4>

      <!-- Welcome -->
      <h2>
        Welcome Back!
      </h2>

      <p class="subtitle">
        Organize your class, assignment, and exam
      </p>

      <!-- Form -->
      <form>
        <input
          type="text"
          class="form-control"
          placeholder="Name">

        <input
          type="email"
          class="form-control"
          placeholder="Email">

        <input
          type="text"
          class="form-control"
          placeholder="Phone Number">

        <input
          type="text"
          class="form-control"
          placeholder="Institute Name">

        <input
          type="password"
          class="form-control"
          placeholder="Password">

        <input
          type="password"
          class="form-control"
          placeholder="Confirm Password">

        <button
          type="submit"
          class="btn btn-signup">
          Sign Up
        </button>
      </form>

      <!-- Bottom -->
      <div class="bottom-text">
        Already have an account?
        <a href="#">
          Sign in
        </a>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
